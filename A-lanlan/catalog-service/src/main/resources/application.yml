server:
  port: 9001
  shutdown: graceful
  tomcat:
    connection-timeout: 1s
    keep-alive-timeout: 15s
    threads:
      max: 50
      min-spare: 5



spring:
  application:
    name: catalog-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  config:
    import: "optional:configserver:"
  cloud:
    config:
      uri: http://localhost:8888
      request-connect-timeout: 2000 # 5s
      request-read-timeout: 2000 # 5s
      fail-fast: false # In production, set to true
      retry:
        max-attempts: 4
        initial-interval: 1000 # 1s
        max-interval: 2000 # 2s
        multiplier: 1.1
  datasource:
    username: user
    password: password
    url: jdbc:postgresql://localhost:5432/polardb_catalog
    hikari:
      connection-timeout: 500 #ms
      maximum-pool-size: 10

management:
  endpoints:
    web:
      exposure:
        include: refresh,health

polar:
  greeting: Welcome to the local book catalog!

app:
  runtime:
    podName: ${POD_NAME:local}
    namespace: ${NAMESPACE:default}

jvm-resource:
  cpuRequest: ${CPU_REQ:-1}
  cpuLimit: ${CPU_LIMIT:-1}
  memRequest: ${MEM_REQ:-1}
  memLimit: ${MEM_LIMIT:-1}

logging:
  level:
    web: INFO
    com:
      polarbookshop:
        catalogservice:
          config: debug