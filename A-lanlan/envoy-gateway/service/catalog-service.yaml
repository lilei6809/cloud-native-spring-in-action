
apiVersion: v1
kind: ServiceAccount
# 在 Kubernetes 中，ServiceAccount（简称 SA）就是你的 Java/Go 应用程序（Pod）在集群里的“身份证”
metadata:
  name: catalog-service
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  labels:
    app: catalog-service
    service: catalog-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 9001
  selector:
    app: catalog-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
      version: v1
  template:
    metadata:
      labels:
        app: catalog-service
        version: v1
      annotations:
        instrumentation.opentelemetry.io/inject-java: "java-instrumentation"
    spec:
      serviceAccountName: catalog-service
      containers:
        - image: catalog-service-6.2.1
          imagePullPolicy: IfNotPresent
          name: catalog-service
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]
          ports:
            - containerPort: 9001
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # 资源变量
            - name: CPU_REQ
              valueFrom:
                resourceFieldRef:
                  resource: requests.cpu
                  divisor: 1m   # 以毫核为单位，500m → 注入 "500"
            - name: CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: 1m
            - name: MEM_REQ
              valueFrom:
                resourceFieldRef:
                  resource: requests.memory
                  divisor: 1Mi   # 以 MB 为单位
            - name: MEM_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: 1Mi

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(NAMESPACE)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-service
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://polar-postgres/polardb_catalog
            - name: DATA_REDIS_HOST
              value: polar-redis
            - name: SPRING_PROFILES_ACTIVE
              value: testdata

            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport  
                -XX:MaxRAMPercentage=75.0
                -XX:InitialRAMPercentage=75.0
                -XX:+AlwaysPreTouch
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/dump/heap.hprof
                -XX:+PrintGCDetails
                -XX:+PrintGCDateStamps
                -Xloggc:/log/gc.log
---

# 第三部分：路由规则 (HTTPRoute)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-service
spec:
  parentRefs:
    - name: envoy-gateway
#  hostnames:
#    - "www.polarbookstore.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hello/books
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /hello
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Gateway-Region
                value: "ap-southeast-1"
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: "max-age=31536000; includeSubDomains"

      backendRefs:
        - name: catalog-service
          kind: Service
          port: 80








