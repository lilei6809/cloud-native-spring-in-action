
apiVersion: v1
kind: ServiceAccount
# 在 Kubernetes 中，ServiceAccount（简称 SA）就是你的 Java/Go 应用程序（Pod）在集群里的“身份证”
metadata:
  name: order-service
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
    service: order-service
spec:
  ports:
    - name: http
      port: 80
      targetPort: 9002
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
      version: v1
  template:
    metadata:
      labels:
        app: order-service
        version: v1
      annotations:
        instrumentation.opentelemetry.io/inject-java: "java-instrumentation"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h polar-postgres -p 5432; do
                echo "Waiting for PostgreSQL at polar-postgres:5432..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      serviceAccountName: order-service
      containers:
        - image: order-service-6.2
          imagePullPolicy: IfNotPresent
          name: order-service
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]
          ports:
            - containerPort: 9002

          readinessProbe:
            httpGet:
              port: 9002
              path: /actuator/health/readiness
            initialDelaySeconds: 10  # 1. 初始延迟
            periodSeconds: 5         # 2. 探测频率
            successThreshold: 1      # 3. 成功阈值
            failureThreshold: 3      # 4. 失败阈值


          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # 资源变量: 用来确认线程池的 core size
            - name: CPU_REQ
              valueFrom:
                resourceFieldRef:
                  resource: requests.cpu
                  divisor: 1m   # 以毫核为单位，500m → 注入 "500"
            - name: CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: 1m
            - name: MEM_REQ
              valueFrom:
                resourceFieldRef:
                  resource: requests.memory
                  divisor: 1Mi   # 以 MB 为单位
            - name: MEM_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: 1Mi

            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(NAMESPACE)"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config-service
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://polar-postgres/polardb_order
            - name: DATA_REDIS_HOST
              value: polar-redis
            - name: SPRING_PROFILES_ACTIVE
              value: testdata
            - name: POLAR_CATALOG-SERVICE-URI
              value: http://catalog-service

            - name: JAVA_OPTS
              value: >-
                -XX:+UseContainerSupport  
                -XX:MaxRAMPercentage=75.0
                -XX:InitialRAMPercentage=75.0
                -XX:+AlwaysPreTouch
                -XX:+HeapDumpOnOutOfMemoryError
                -XX:HeapDumpPath=/dump/heap.hprof
                -XX:+PrintGCDetails
                -XX:+PrintGCDateStamps
                -Xloggc:/log/gc.log
---

# 第三部分：路由规则 (HTTPRoute)
# GET /orders  宽松规则, 不用权限
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order-read-route
spec:
  parentRefs:
    - name: envoy-gateway
#  hostnames:
#    - "www.polarbookstore.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: order-service
          port: 80  # 注意: 这个地方填的是 Service 暴露的端口
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /orders
          method: GET



# 对于 post 请求, 需要验证 api key
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order-post-route
spec:
  parentRefs:
    - name: envoy-gateway
  #  hostnames:
  #    - "www.polarbookstore.com"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: order-service
          port: 80  # 注意: 这个地方填的是 Service 暴露的端口
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /orders
          method: POST


# 配置 api key
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: apikey-secret
stringData:
  client1: abc  # clientId : api key

