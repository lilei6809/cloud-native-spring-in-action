services:

  # Applications

  catalog-service:
    depends_on:
      - polar-postgres
    image: "${CATALOG_SERVICE_IMAGE}"
    container_name: "catalog-service"
    ports:
      - 9001:9001
      - 8001:8001
    environment:
      # Buildpacks environment variable to configure the number of threads in memory calculation
#      - BPL_JVM_THREAD_COUNT=50
#      # Buildpacks environment variable to enable debug through a socket on port 8001
#      - BPL_DEBUG_ENABLED=true
#      - BPL_DEBUG_PORT=8001
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://polar-postgres:5432/polardb_catalog
      - SPRING_PROFILES_ACTIVE=testdata
  
  config-service:
    image: "${CONFIG_SERVICE_IMAGE}"
    container_name: "config-service"
    ports:
      - 8888:8888
      - 9888:9888
#    environment:
#      # Buildpacks environment variable to configure the number of threads in memory calculation
#      - BPL_JVM_THREAD_COUNT=50
#      # Buildpacks environment variable to enable debug through a socket on port 9888
#      - BPL_DEBUG_ENABLED=true
#      - BPL_DEBUG_PORT=9888

  order-service:
    image: "${ORDER_SERVICE_IMAGE}"
    container_name: "order-service"
    ports:
      - 9002:9002
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://polar-postgres:5432/polardb_order
      - SPRING_PROFILES_ACTIVE=testdata
      - POLAR_CATALOG_SERVICE_URI=${POLAR_CATALOG_SERVICE_URI}

  edge-server:
    image: edge-server-6:latest
    container_name: "edge-server"
    ports:
      - 9000:9000
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - CATALOG_SERVICE_URL=http://catalog-service:9001
      - ORDER_SERVICE_URL=http://order-service:9002

  jaeger:
    image: "jaegertracing/all-in-one"
    container_name: "jaeger"
    ports:
      - 16686:16686
      - 4318:4318

  # Backing Services

  polar-postgres:
    image: "postgres:14.4"
    container_name: "polar-postgres"
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - ./polar-deployment/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  polar-redis:
    image: "redis:7-alpine"
    container_name: polar-redis
    ports:
      - 6379:6379

  polar-kafka:
    image: "apache/kafka:4.2.0"
    container_name: "polar-kafka"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # Example Cluster ID
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - polar-kafka
