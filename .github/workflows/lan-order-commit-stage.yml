name: order Commit Stage
on:
  push:
    paths:
      - 'A-lanlan/order-service/**'
      - '.github/workflows/lan-order-commit-stage.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lilei6809/order-service
  VERSION: lastest

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Build, unit tests and integration tests
        run: |
          cd A-lanlan/order-service
          chmod +x gradlew
          ./gradlew build

      - name: Code vulnerability scanning
        uses: anchore/scan-action@v3
        id: scan
        with:
          path: "${{ github.workspace }}/A-lanlan/order-service"
          fail-build: false
          severity-cutoff: high
      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Install arkade and kubeconform
        run: |
          curl -sLS https://get.arkade.dev | sudo sh
          arkade get kubeconform
          echo "$HOME/.arkade/bin" >> $GITHUB_PATH
      - name: Validate Kubernetes manifests
        run: |
          cd A-lanlan/order-service
          find k8s -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
            | xargs -0 -r kubeconform -strict -summary -ignore-missing-schemas
  package:
    name: Package and Publish
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [ build ]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Build container image
        run: |
          cd A-lanlan/order-service
          chmod +x gradlew
          ./gradlew bootBuildImage \
            --imageName ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
      - name: OCI image vulnerability scanning
        uses: anchore/scan-action@v3
        id: scan
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          fail-build: false
          severity-cutoff: high
      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
      - name: Log into container registry (retry)
        shell: bash
        run: |
          set -euo pipefail

          # GHCR /v2/ without credentials commonly returns 401, which still
          # means the registry endpoint is reachable.
          for i in {1..5}; do
            http_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "https://${{ env.REGISTRY }}/v2/" || true)"
            if [ "$http_code" = "200" ] || [ "$http_code" = "401" ]; then
              echo "Registry reachable (HTTP ${http_code})"
              break
            fi
            echo "Registry probe failed with HTTP ${http_code:-n/a} (attempt ${i}/5), retrying..."
            sleep $((i * 4))
          done

          for i in {1..5}; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin; then
              echo "Docker login succeeded"
              exit 0
            fi
            echo "Docker login failed (attempt ${i}/5), retrying..."
            sleep $((i * 4))
          done

          echo "Docker login to ${{ env.REGISTRY }} failed after retries"
          exit 1
      - name: Publish container image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

